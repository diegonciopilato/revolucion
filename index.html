<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Marx y Lenin contra los Burgueses</title>


<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    touch-action:none;
}

canvas{
    display:block;
    margin:auto;
}

</style>

</head>


<body>

<audio id="musica" src="musica.mp3" loop preload="auto"></audio>


<canvas id="game" width="900" height="500"></canvas>



<script>


const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const musica=document.getElementById("musica");

// ==========================
// AUDIO: intento de autoplay + fallback en primera interaccion
// ==========================

let musicaSonando=false;

function intentarReproducirMusica(){

    if(musicaSonando) return;

    musica.volume=1;

    let intento=musica.play();

    if(intento!==undefined){

        intento.then(function(){

            // el navegador permitio el autoplay
            musicaSonando=true;

        }).catch(function(error){

            // el navegador bloqueo el autoplay, se necesita interaccion
            console.log("Autoplay bloqueado, esperando interaccion del usuario:",error);

        });

    }

}

// 1) Intentamos apenas carga la pagina (puede funcionar segun navegador/config)
window.addEventListener("load", intentarReproducirMusica);

// 2) Fallback: apenas haya CUALQUIER interaccion (touch, click o tecla),
//    que va a pasar naturalmente cuando el usuario empiece a jugar,
//    disparamos el audio. No es un boton dedicado, es la misma
//    interaccion que ya usa el jugador para moverse/disparar.
function primeraInteraccion(){

    intentarReproducirMusica();

    window.removeEventListener("pointerdown", primeraInteraccion);
    window.removeEventListener("keydown", primeraInteraccion);
    window.removeEventListener("touchstart", primeraInteraccion);

}

window.addEventListener("pointerdown", primeraInteraccion);
window.addEventListener("keydown", primeraInteraccion);
window.addEventListener("touchstart", primeraInteraccion);


// ==========================
// IMAGENES
// ==========================


let fondo=new Image();
fondo.src="fondo.png";


let marx=new Image();
marx.src="marx.png";


let lenin=new Image();
lenin.src="lenin.png";


let burgues=new Image();
burgues.src="burgues.png";


let jefeImg=new Image();
jefeImg.src="jefe.png";


let balaImg=new Image();
balaImg.src="bala.png";


let fuegoImg=new Image();
fuegoImg.src="fuego.png";


let corazon=new Image();
corazon.src="corazon.png";


let plusvalia=new Image();
plusvalia.src="plusvalia.png";




// ==========================
// JUGADOR
// ==========================


let jugador={

x:100,

y:220,

w:100,

h:90,

velocidad:5,

vidas:3

};



// ==========================
// OBJETOS
// ==========================


let balas=[];

let enemigos=[];

let fuegos=[];

let corazones=[];

let plus=[];


let jefe=null;


let burguesesDerrotados=0;



// ==========================
// TECLADO
// ==========================


let teclas={};


document.addEventListener("keydown",function(e){


teclas[e.key]=true;


if(e.code==="Space"){

disparar();

}


});



document.addEventListener("keyup",function(e){

teclas[e.key]=false;

});




// ==========================
// CONTROL MOVIL
// ==========================



canvas.addEventListener("touchstart",function(e){

e.preventDefault();


disparar();


},{passive:false});





canvas.addEventListener("touchmove",function(e){

e.preventDefault();


let toque=e.touches[0];


let rect=canvas.getBoundingClientRect();


jugador.x=toque.clientX-rect.left-50;

jugador.y=toque.clientY-rect.top-45;


limites();



},{passive:false});





// ==========================
// DISPARAR
// ==========================


function disparar(){


balas.push({

x:jugador.x+90,

y:jugador.y+40,

w:30,

h:15,

velocidad:10


});


}




// ==========================
// CREAR BURGUESES
// ==========================


setInterval(function(){



if(!jefe){


enemigos.push({


x:900,


y:Math.random()*410,


w:70,

h:90,


velocidad:2,


vida:1


});


}



},1500);






// ==========================
// APARICION DEL JEFE
// ==========================


setInterval(function(){


if(jefe){


fuegos.push({


x:jefe.x,

y:jefe.y+70,


w:40,

h:40,


velocidad:6


});


}



},1000);





// ==========================
// COLISION
// ==========================


function choque(a,b){


return(

a.x < b.x+b.w &&

a.x+a.w > b.x &&

a.y < b.y+b.h &&

a.y+a.h > b.y

);


}




// ==========================
// LIMITES
// ==========================


function limites(){


if(jugador.x<0)
jugador.x=0;


if(jugador.x>canvas.width-100)
jugador.x=canvas.width-100;



if(jugador.y<0)
jugador.y=0;


if(jugador.y>canvas.height-100)
jugador.y=canvas.height-100;


}




// ==========================
// ACTUALIZACION
// ==========================


function update(){


// MOVIMIENTO TECLADO


if(teclas["ArrowUp"] || teclas["w"])
jugador.y-=jugador.velocidad;


if(teclas["ArrowDown"] || teclas["s"])
jugador.y+=jugador.velocidad;


if(teclas["ArrowLeft"] || teclas["a"])
jugador.x-=jugador.velocidad;


if(teclas["ArrowRight"] || teclas["d"])
jugador.x+=jugador.velocidad;



limites();




// ==========================
// BALAS
// ==========================


for(let i=balas.length-1;i>=0;i--){


let b=balas[i];


b.x+=b.velocidad;



// GOLPE A BURGUES


for(let j=enemigos.length-1;j>=0;j--){


let e=enemigos[j];


if(choque(b,e)){


enemigos.splice(j,1);

balas.splice(i,1);



burguesesDerrotados++;





plus.push({

x:e.x,

y:e.y,

tiempo:120

});




corazones.push({

x:e.x,

y:e.y,

w:35,

h:35

});





if(burguesesDerrotados>=12 && !jefe){


jefe={


x:750,

y:170,


w:130,

h:160,


vida:20,


velocidad:1


};


burguesesDerrotados=0;


}



break;


}



}




// GOLPE AL JEFE


if(jefe && choque(b,jefe)){


jefe.vida--;


balas.splice(i,1);



if(jefe.vida<=0){


plus.push({

x:jefe.x,

y:jefe.y,

tiempo:250

});



corazones.push({

x:jefe.x,

y:jefe.y,

w:40,

h:40

});


corazones.push({

x:jefe.x+50,

y:jefe.y,

w:40,

h:40

});



jefe=null;



}



}



}

// ==========================
// MOVIMIENTO ENEMIGOS
// ==========================


for(let e of enemigos){


e.x-=e.velocidad;



if(choque(jugador,e)){


jugador.vidas--;


e.x=950;


}



}





// ==========================
// JEFE
// ==========================


if(jefe){


jefe.x-=jefe.velocidad;



if(jefe.x<550){

jefe.x=550;

}



}





// ==========================
// FUEGOS DEL JEFE
// ==========================


for(let i=fuegos.length-1;i>=0;i--){


let f=fuegos[i];


f.x-=f.velocidad;



if(choque(f,jugador)){


jugador.vidas--;


fuegos.splice(i,1);


}



if(f.x<0){


fuegos.splice(i,1);


}



}






// ==========================
// CORAZONES
// ==========================


for(let i=corazones.length-1;i>=0;i--){


let c=corazones[i];



if(choque(jugador,c)){



if(jugador.vidas<5){

jugador.vidas++;

}



corazones.splice(i,1);



}



}





// ==========================
// PLUSVALIA
// ==========================


for(let i=plus.length-1;i>=0;i--){


plus[i].tiempo--;



if(plus[i].tiempo<=0){


plus.splice(i,1);


}



}





}







// ==========================
// DIBUJAR
// ==========================


function draw(){



// FONDO


ctx.drawImage(

fondo,

0,

0,

900,

500

);





// MARX


ctx.drawImage(

marx,

jugador.x,

jugador.y,

60,

80

);





// LENIN


ctx.drawImage(

lenin,

jugador.x+35,

jugador.y,

60,

80

);






// BALAS


for(let b of balas){


ctx.drawImage(

balaImg,

b.x,

b.y,

30,

15

);



}






// BURGUESES


for(let e of enemigos){


ctx.drawImage(

burgues,

e.x,

e.y,

70,

90

);



}






// JEFE


if(jefe){


ctx.drawImage(

jefeImg,

jefe.x,

jefe.y,

130,

160

);



// barra de vida


ctx.fillStyle="red";


ctx.fillRect(

jefe.x,

jefe.y-20,

jefe.vida*6,

12

);



}






// FUEGOS


for(let f of fuegos){


ctx.drawImage(

fuegoImg,

f.x,

f.y,

40,

40

);


}






// CORAZONES


for(let c of corazones){


ctx.drawImage(

corazon,

c.x,

c.y,

35,

35

);



}






// PLUSVALIA


for(let p of plus){


ctx.drawImage(

plusvalia,

p.x,

p.y,

50,

50

);



}






// VIDAS


ctx.fillStyle="white";

ctx.font="25px Arial";


ctx.fillText(

"Vida: "+jugador.vidas,

20,

35

);






// DERROTA


if(jugador.vidas<=0){



ctx.fillStyle="red";

ctx.font="55px Arial";


ctx.fillText(

"FIN DE LA REVOLUCIÓN",

120,

250

);



return;


}






requestAnimationFrame(loop);



}







function loop(){


update();

draw();


}






fondo.onload=function(){


loop();


};




</script>


</body>

</html>
