<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Marx y Lenin contra los Burgueses</title>


<style>

html, body{
    margin:0;
    padding:0;
    overflow:hidden;
    background:black;
    touch-action:none;
    width:100%;
    height:100%;
}

#stage{
    display:flex;
    align-items:center;
    justify-content:center;
    position:absolute;
    top:0;
    left:0;
}

canvas{
    display:block;
    max-width:100%;
    max-height:100%;
}

</style>

</head>


<body>

<audio id="musica" src="audio.mp3" loop preload="auto"></audio>

<div id="stage">
<canvas id="game" width="900" height="500"></canvas>
</div>



<script>


const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const musica=document.getElementById("musica");


// ==========================
// AUDIO: se desbloquea con el primer toque (requisito de iOS/Android)
// ==========================

let musicaSonando=false;
let intentandoReproducir=false;

function intentarReproducirMusica(){

    if(musicaSonando || intentandoReproducir) return;

    intentandoReproducir=true;

    musica.muted=false;
    musica.volume=1;

    let intento=musica.play();

    if(intento!==undefined){

        intento.then(function(){

            musicaSonando=true;
            intentandoReproducir=false;

        }).catch(function(error){

            intentandoReproducir=false;

        });

    }else{

        intentandoReproducir=false;

    }

}


// Se dispara con el primer toque/click/tecla en cualquier parte de la pantalla.
// No hace falta boton: alcanza con que el usuario empiece a jugar.
// Un solo tipo de evento por dispositivo, para no disparar play() dos veces
// al mismo tiempo (eso hacia que el navegador aborte la reproduccion).

window.addEventListener("pointerdown", intentarReproducirMusica, {passive:true});
window.addEventListener("keydown", intentarReproducirMusica);



// ==========================
// ROTACION AUTOMATICA EN MOVIL
// ==========================
// Si el ancho de pantalla es menor que el alto (esta "parado"),
// rotamos el escenario 90 grados para que se vea horizontal,
// sin pedir permiso ni fullscreen.

const stage=document.getElementById("stage");

const ANCHO_JUEGO=900;
const ALTO_JUEGO=500;

let estaRotado=false;


function ajustarPantalla(){

    let anchoPantalla=window.innerWidth;
    let altoPantalla=window.innerHeight;


    if(altoPantalla>anchoPantalla){

        estaRotado=true;

        // ESTA VERTICAL -> rotamos

        stage.style.width=altoPantalla+"px";
        stage.style.height=anchoPantalla+"px";

        stage.style.transform="rotate(90deg)";
        stage.style.transformOrigin="top left";

        stage.style.left=anchoPantalla+"px";
        stage.style.top="0px";


        let escala=Math.min(altoPantalla/ANCHO_JUEGO, anchoPantalla/ALTO_JUEGO);

        canvas.style.width=(ANCHO_JUEGO*escala)+"px";
        canvas.style.height=(ALTO_JUEGO*escala)+"px";


    }else{

        estaRotado=false;

        // YA ESTA HORIZONTAL -> normal, sin rotar

        stage.style.width=anchoPantalla+"px";
        stage.style.height=altoPantalla+"px";

        stage.style.transform="none";

        stage.style.left="0px";
        stage.style.top="0px";


        let escala=Math.min(anchoPantalla/ANCHO_JUEGO, altoPantalla/ALTO_JUEGO);

        canvas.style.width=(ANCHO_JUEGO*escala)+"px";
        canvas.style.height=(ALTO_JUEGO*escala)+"px";

    }

}


window.addEventListener("resize", ajustarPantalla);
window.addEventListener("orientationchange", ajustarPantalla);

ajustarPantalla();


// ==========================
// IMAGENES
// ==========================


let fondo=new Image();
fondo.src="fondo.png";


let marx=new Image();
marx.src="marx.png";


let lenin=new Image();
lenin.src="lenin.png";


let burgues=new Image();
burgues.src="burgues.png";


let jefeImg=new Image();
jefeImg.src="jefe.png";


let balaImg=new Image();
balaImg.src="bala.png";


let fuegoImg=new Image();
fuegoImg.src="fuego.png";


let corazon=new Image();
corazon.src="corazon.png";


let plusvalia=new Image();
plusvalia.src="plusvalia.png";




// ==========================
// JUGADOR
// ==========================


let jugador={

x:100,

y:220,

w:100,

h:90,

velocidad:5,

vidas:3

};



// ==========================
// OBJETOS
// ==========================


let balas=[];

let enemigos=[];

let fuegos=[];

let corazones=[];

let plus=[];


let jefe=null;


let burguesesDerrotados=0;



// ==========================
// TECLADO
// ==========================


let teclas={};


document.addEventListener("keydown",function(e){


teclas[e.key]=true;


if(e.code==="Space"){

disparar();

}


});



document.addEventListener("keyup",function(e){

teclas[e.key]=false;

});




// ==========================
// CONTROL MOVIL
// ==========================



canvas.addEventListener("touchstart",function(e){

e.preventDefault();


disparar();


},{passive:false});





canvas.addEventListener("touchmove",function(e){

e.preventDefault();


let toque=e.touches[0];


let rect=canvas.getBoundingClientRect();


let gameX, gameY;


if(estaRotado){

    // el canvas esta girado 90 grados, hay que "desgirar" el toque

    let escala=rect.width/ALTO_JUEGO;

    gameX=(toque.clientY-rect.top)/escala;

    gameY=((rect.left+rect.width)-toque.clientX)/escala;

}else{

    let escala=rect.width/ANCHO_JUEGO;

    gameX=(toque.clientX-rect.left)/escala;

    gameY=(toque.clientY-rect.top)/escala;

}


jugador.x=gameX-50;

jugador.y=gameY-45;


limites();



},{passive:false});





// ==========================
// DISPARAR
// ==========================


function disparar(){


balas.push({

x:jugador.x+90,

y:jugador.y+40,

w:30,

h:15,

velocidad:10


});


}




// ==========================
// CREAR BURGUESES
// ==========================


setInterval(function(){



if(!jefe){


enemigos.push({


x:900,


y:Math.random()*410,


w:70,

h:90,


velocidad:2,


vida:1


});


}



},1500);






// ==========================
// APARICION DEL JEFE
// ==========================


setInterval(function(){


if(jefe){


fuegos.push({


x:jefe.x,

y:jefe.y+70,


w:40,

h:40,


velocidad:6


});


}



},1000);





// ==========================
// COLISION
// ==========================


function choque(a,b){


return(

a.x < b.x+b.w &&

a.x+a.w > b.x &&

a.y < b.y+b.h &&

a.y+a.h > b.y

);


}




// ==========================
// LIMITES
// ==========================


function limites(){


if(jugador.x<0)
jugador.x=0;


if(jugador.x>canvas.width-100)
jugador.x=canvas.width-100;



if(jugador.y<0)
jugador.y=0;


if(jugador.y>canvas.height-100)
jugador.y=canvas.height-100;


}




// ==========================
// ACTUALIZACION
// ==========================


function update(){


// MOVIMIENTO TECLADO


if(teclas["ArrowUp"] || teclas["w"])
jugador.y-=jugador.velocidad;


if(teclas["ArrowDown"] || teclas["s"])
jugador.y+=jugador.velocidad;


if(teclas["ArrowLeft"] || teclas["a"])
jugador.x-=jugador.velocidad;


if(teclas["ArrowRight"] || teclas["d"])
jugador.x+=jugador.velocidad;



limites();




// ==========================
// BALAS
// ==========================


for(let i=balas.length-1;i>=0;i--){


let b=balas[i];


b.x+=b.velocidad;



// GOLPE A BURGUES


for(let j=enemigos.length-1;j>=0;j--){


let e=enemigos[j];


if(choque(b,e)){


enemigos.splice(j,1);

balas.splice(i,1);



burguesesDerrotados++;





plus.push({

x:e.x,

y:e.y,

tiempo:120

});




corazones.push({

x:e.x,

y:e.y,

w:35,

h:35

});





if(burguesesDerrotados>=12 && !jefe){


jefe={


x:750,

y:170,


w:130,

h:160,


vida:20,


velocidad:1


};


burguesesDerrotados=0;


}



break;


}



}




// GOLPE AL JEFE


if(jefe && choque(b,jefe)){


jefe.vida--;


balas.splice(i,1);



if(jefe.vida<=0){


plus.push({

x:jefe.x,

y:jefe.y,

tiempo:250

});



corazones.push({

x:jefe.x,

y:jefe.y,

w:40,

h:40

});


corazones.push({

x:jefe.x+50,

y:jefe.y,

w:40,

h:40

});



jefe=null;



}



}



}

// ==========================
// MOVIMIENTO ENEMIGOS
// ==========================


for(let e of enemigos){


e.x-=e.velocidad;



if(choque(jugador,e)){


jugador.vidas--;


e.x=950;


}



}





// ==========================
// JEFE
// ==========================


if(jefe){


jefe.x-=jefe.velocidad;



if(jefe.x<550){

jefe.x=550;

}



}





// ==========================
// FUEGOS DEL JEFE
// ==========================


for(let i=fuegos.length-1;i>=0;i--){


let f=fuegos[i];


f.x-=f.velocidad;



if(choque(f,jugador)){


jugador.vidas--;


fuegos.splice(i,1);


}



if(f.x<0){


fuegos.splice(i,1);


}



}






// ==========================
// CORAZONES
// ==========================


for(let i=corazones.length-1;i>=0;i--){


let c=corazones[i];



if(choque(jugador,c)){



if(jugador.vidas<5){

jugador.vidas++;

}



corazones.splice(i,1);



}



}





// ==========================
// PLUSVALIA
// ==========================


for(let i=plus.length-1;i>=0;i--){


plus[i].tiempo--;



if(plus[i].tiempo<=0){


plus.splice(i,1);


}



}





}







// ==========================
// DIBUJAR
// ==========================


function draw(){



// FONDO


ctx.drawImage(

fondo,

0,

0,

900,

500

);





// MARX


ctx.drawImage(

marx,

jugador.x,

jugador.y,

60,

80

);





// LENIN


ctx.drawImage(

lenin,

jugador.x+35,

jugador.y,

60,

80

);






// BALAS


for(let b of balas){


ctx.drawImage(

balaImg,

b.x,

b.y,

30,

15

);



}






// BURGUESES


for(let e of enemigos){


ctx.drawImage(

burgues,

e.x,

e.y,

70,

90

);



}






// JEFE


if(jefe){


ctx.drawImage(

jefeImg,

jefe.x,

jefe.y,

130,

160

);



// barra de vida


ctx.fillStyle="red";


ctx.fillRect(

jefe.x,

jefe.y-20,

jefe.vida*6,

12

);



}






// FUEGOS


for(let f of fuegos){


ctx.drawImage(

fuegoImg,

f.x,

f.y,

40,

40

);


}






// CORAZONES


for(let c of corazones){


ctx.drawImage(

corazon,

c.x,

c.y,

35,

35

);



}






// PLUSVALIA


for(let p of plus){


ctx.drawImage(

plusvalia,

p.x,

p.y,

50,

50

);



}






// VIDAS


ctx.fillStyle="white";

ctx.font="25px Arial";


ctx.fillText(

"Vida: "+jugador.vidas,

20,

35

);






// DERROTA


if(jugador.vidas<=0){



ctx.fillStyle="red";

ctx.font="55px Arial";


ctx.fillText(

"FIN DE LA REVOLUCIÓN",

120,

250

);



return;


}






requestAnimationFrame(loop);



}







function loop(){


update();

draw();


}






fondo.onload=function(){


loop();


};




</script>


</body>

</html>
